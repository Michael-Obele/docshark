name: Cleanup Release Please Branches

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  cleanup-release-please-branch:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.event.pull_request.head.ref, 'release-please--') }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete release-please branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const [owner, repo] = context.repo.owner
              ? [context.repo.owner, context.repo.repo]
              : [null, null];

            if (!owner || !repo) {
              core.setFailed('Missing repository context.');
              return;
            }

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });

              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });

              core.info(`Deleted branch ${branch}.`);
            } catch (error) {
              if (error && typeof error === 'object' && 'status' in error) {
                const status = Number(error.status);
                if (status === 404 || status === 422) {
                  core.info(`Branch ${branch} was already deleted or is unavailable.`);
                  return;
                }
              }

              throw error;
            }
